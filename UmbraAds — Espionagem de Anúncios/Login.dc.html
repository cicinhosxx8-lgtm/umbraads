<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #09090b; color: #d4d4d8; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #a1a1aa; text-decoration: none; }
  a:hover { color: #f4f4f5; }
  ::selection { background: rgba(245,158,11,0.3); }
  .umbra-input { width:100%; background:#09090b; border:1px solid #27272a; border-radius:10px; padding:12px 14px; font-size:14.5px; color:#f4f4f5; font-family:inherit; outline:none; transition:border-color .15s, box-shadow .15s; }
  .umbra-input::placeholder { color:#52525b; }
  .umbra-input:focus { border-color:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,0.15); }
</style>
</helmet>

<div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; position:relative; overflow:hidden;">

  <!-- brilho amber difuso -->
  <div style="position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); width:640px; height:420px; background:radial-gradient(ellipse at center, rgba(245,158,11,0.16), rgba(245,158,11,0.04) 45%, transparent 70%); filter:blur(40px); pointer-events:none;"></div>

  <div style="position:relative; width:100%; max-width:420px;">
    <!-- CARD -->
    <div style="background:#18181b; border:1px solid #27272a; border-radius:16px; padding:36px 34px; box-shadow:0 30px 80px -30px rgba(0,0,0,0.9);">

      <div style="text-align:center; font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#f4f4f5; margin-bottom:28px;">Umbra<span style="color:#f59e0b;">Ads</span></div>

      <!-- tabs -->
      <div style="display:flex; gap:4px; background:#09090b; border:1px solid #27272a; border-radius:10px; padding:4px; margin-bottom:26px;">
        <button onClick="{{ setLogin }}" style="{{ tabLoginStyle }}">Entrar</button>
        <button onClick="{{ setSignup }}" style="{{ tabSignupStyle }}">Criar conta</button>
      </div>

      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:22px; font-weight:700; color:#f4f4f5; letter-spacing:-0.02em;">{{ title }}</div>
        <div style="font-size:14px; color:#a1a1aa; margin-top:6px;">{{ subtitle }}</div>
      </div>

      <!-- Nome (só cadastro) -->
      <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:12.5px; font-weight:600; color:#a1a1aa; margin-bottom:7px;">Nome</label>
          <input class="umbra-input" type="text" placeholder="Como te chamam" />
        </div>
      </sc-if>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:12.5px; font-weight:600; color:#a1a1aa; margin-bottom:7px;">E-mail</label>
        <input class="umbra-input" type="email" placeholder="voce@email.com" />
      </div>

      <div style="margin-bottom:8px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;">
          <label style="font-size:12.5px; font-weight:600; color:#a1a1aa;">Senha</label>
          <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
            <a href="#" style="font-size:12.5px; color:#a1a1aa;">Esqueci minha senha</a>
          </sc-if>
        </div>
        <input class="umbra-input" type="password" placeholder="••••••••" />
      </div>

      <!-- botão primário -->
      <button style="width:100%; margin-top:20px; background:#f59e0b; color:#09090b; font-size:15px; font-weight:700; font-family:inherit; border:none; border-radius:10px; padding:13px; cursor:pointer;" style-hover="background:#fbbf24;">{{ primaryLabel }}</button>

      <!-- divisor -->
      <div style="display:flex; align-items:center; gap:14px; margin:22px 0;">
        <div style="flex:1; height:1px; background:#27272a;"></div>
        <div style="font-size:12px; color:#52525b; font-weight:500;">ou</div>
        <div style="flex:1; height:1px; background:#27272a;"></div>
      </div>

      <!-- Google -->
      <button style="width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:transparent; border:1px solid #3f3f46; color:#f4f4f5; font-size:14.5px; font-weight:600; font-family:inherit; border-radius:10px; padding:12px; cursor:pointer;" style-hover="border-color:#71717a; background:#1f1f23;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar com Google
      </button>

      <!-- rodapé card -->
      <div style="text-align:center; font-size:13.5px; color:#a1a1aa; margin-top:26px;">
        {{ footerText }} <a href="#" onClick="{{ toggleMode }}" style="color:#f59e0b; font-weight:600;">{{ footerLink }}</a>
      </div>
    </div>

    <!-- fora do card -->
    <div style="text-align:center; font-size:12px; color:#71717a; margin-top:22px; line-height:1.6; padding:0 20px;">
      Ao entrar você concorda com os <a href="#" style="color:#a1a1aa; text-decoration:underline;">Termos de Uso</a> e a <a href="#" style="color:#a1a1aa; text-decoration:underline;">Política de Privacidade</a>.
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { mode: "login" };

  renderVals() {
    const isLogin = this.state.mode === "login";
    const isSignup = !isLogin;
    const activeTab = "flex:1; text-align:center; font-size:13.5px; font-weight:600; font-family:inherit; border:none; border-radius:7px; padding:9px; cursor:pointer; background:#27272a; color:#f59e0b;";
    const idleTab = "flex:1; text-align:center; font-size:13.5px; font-weight:600; font-family:inherit; border:none; border-radius:7px; padding:9px; cursor:pointer; background:transparent; color:#71717a;";

    return {
      isLogin, isSignup,
      title: isLogin ? "Bem-vindo de volta" : "Crie sua conta grátis",
      subtitle: isLogin ? "Entra aí e vai direto pro feed de ofertas." : "Comece a modelar o que já vende hoje mesmo.",
      primaryLabel: isLogin ? "Entrar" : "Criar minha conta",
      footerText: isLogin ? "Ainda não tem conta?" : "Já tem uma conta?",
      footerLink: isLogin ? "Criar conta grátis" : "Fazer login",
      tabLoginStyle: isLogin ? activeTab : idleTab,
      tabSignupStyle: isSignup ? activeTab : idleTab,
      setLogin: () => this.setState({ mode: "login" }),
      setSignup: () => this.setState({ mode: "signup" }),
      toggleMode: (e) => { if (e) e.preventDefault(); this.setState(s => ({ mode: s.mode === "login" ? "signup" : "login" })); }
    };
  }
}
</script>
</body>
</html>
